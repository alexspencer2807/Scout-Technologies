<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scout Technologies | Checkout</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Teko:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
</head>
<body>

<header class="site-header">
  <div class="header-inner container">
    <img src="{{ url_for('static', filename='media/Scout Videography Logo.jpg') }}" class="header-logo" alt="Logo">

    <!-- Navigation -->
    <ul class="nav-list">
      <li><a href="{{ url_for('home') }}">Home</a></li>
      <li><a href="{{ url_for('products') }}">Shop</a></li>
      <li><a href="{{ url_for('about') }}">About</a></li>
      <li><a href="{{ url_for('checkout') }}">Checkout</a></li>
    </ul>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>

    <!-- Cart -->
    <div class="cart-icon" id="cartIcon">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartCount">0</span>
    </div>

    <div class="cart-dropdown" id="cartDropdown">
      <h3>Your Cart</h3>
      <ul id="cartItems"></ul>
      <p>Total: $<span id="cartTotal">0</span></p>
      <button type="button" class="btn" id="cartCheckoutBtn">Checkout</button>
    </div>
  </div>
</header>

<section class="section checkout-section">
  <div class="container">
    <h1>Checkout</h1>

    <!-- Cart Summary -->
    <div id="cartItemsSummary" class="cart-summary"></div>

    <!-- Stripe Payment Form -->
    <form id="payment-form">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <div id="card-element" class="card-element"></div>
      <div id="payment-message" class="payment-message"></div>
      <button type="submit" class="btn">Pay Now</button>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-section">
      <h4>Shop</h4>
      <ul>
        <li><a href="{{ url_for('products') }}">Men</a></li>
        <li><a href="{{ url_for('products') }}">Women</a></li>
        <li><a href="{{ url_for('products') }}">Kids</a></li>
      </ul>
    </div>
    <div class="footer-section">
      <h4>Company</h4>
      <ul>
        <li><a href="{{ url_for('about') }}">About Us</a></li>
        <li><a href="#">Careers</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 Scout Technologies reserved.</p>
  </div>
</footer>

<!-- Scripts -->
<!-- Load Stripe JS library -->
<script src="https://js.stripe.com/v3/"></script>

<!-- Initialize Stripe with your public key passed from Flask -->
<script>const stripe = Stripe("{{ stripe_public_key }}");</script>

<!-- Your other scripts -->
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
<script src="{{ url_for('static', filename='js/hamburger.js') }}"></script>
<script src="{{ url_for('static', filename='js/notification.js') }}"></script>
<script src="{{ url_for('static', filename='js/checkout.js') }}"></script>
</body>
</html>
