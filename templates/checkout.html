<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Scout Technologies | Products</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Teko:wght@400;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <!-- HEADER -->
    <header class="site-header">
    <div class="header-inner container">
        <img src="{{ url_for('static', filename='media/Scout Videography Logo.jpg') }}" class="header-logo" alt="Logo">

        <!-- Navigation -->
        <ul class="nav-list" id="navList">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('products') }}">Shop</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('checkout') }}">Checkout</a></li>
        </ul>

        <!-- Hamburger Button -->
        <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
        </div>

        <!-- Cart Icon -->
        <div class="cart-icon" id="cartIcon">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount">0</span>
        </div>
    </div>

    <!-- Cart Dropdown -->
    <div class="cart-dropdown" id="cartDropdown">
        <h3>Your Cart</h3>
        <ul id="cartItems"></ul>
        <p>Total: $<span id="cartTotal">0</span></p>
        <a href="{{ url_for('checkout') }}">
        <button id="checkoutBtn">Checkout</button>
        </a>
    </div>
    </header>

  <section class="section">
    <div class="container">
      <h1>Checkout</h1>
      <form action="{{ url_for('checkout') }}" method="POST" class="checkout-form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="card_number" placeholder="Card Number" required>
        <input type="text" name="exp_date" placeholder="Expiry MM/YY" required>
        <input type="text" name="cvv" placeholder="CVV" required>
        <button type="submit">Pay Now</button>
      </form>
    </div>
  </section>

    <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-section">
        <h4>Shop</h4>
        <ul>
          <li><a href="{{ url_for('products') }}">Men</a></li>
          <li><a href="{{ url_for('products') }}">Women</a></li>
          <li><a href="{{ url_for('products') }}">Kids</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h4>Company</h4>
        <ul>
          <li><a href="{{ url_for('about') }}">About Us</a></li>
          <li><a href="#">Careers</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Scout Technologies reserved.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
  <script src="{{ url_for('static', filename='js/hamburger.js') }}"></script>

</body>
</html>
